<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Flipkart Clone</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background-color:whitesmoke;
      overflow-x:hidden;
      font-family:Arial, Helvetica, sans-serif;
    }

    a{
      text-decoration:none;
      color:black;
    }

    /* HEADER */

    header{

      background-color:white;

      display:flex;

      justify-content:space-between;

      align-items:center;

      gap:1rem;

      flex-wrap:wrap;

      padding:0.8rem 1rem;

      position:sticky;

      top:0;

      z-index:1000;
    }

    header img{
      height:3rem;
    }

    /* MENU ICON */

    .menu-icon{

      display:none;

      font-size:1.8rem;

      cursor:pointer;
    }

    /* SEARCH */

    .icon{

      display:flex;

      align-items:center;

      flex:1;

      min-width:250px;

      max-width:600px;
    }

    .oc{

      height:2.5rem;

      width:3rem;

      display:flex;

      justify-content:center;

      align-items:center;

      background-color:#F0F5FF;

      border-radius:10px 0px 0px 10px;
    }

    input[type="text"]{

      width:100%;

      height:2.5rem;

      border:none;

      outline:none;

      padding-left:1rem;

      background-color:#F0F5FF;

      border-radius:0px 10px 10px 0px;

      font-size:1rem;
    }

    /* NAV ITEMS */

    .left,
    .lt{

      display:flex;

      align-items:center;

      gap:0.4rem;

      font-size:1rem;
    }

    .mc{
      font-size:2rem;
    }

    /* CATEGORY */

    section{

      margin:1rem;

      background-color:white;

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(100px,1fr));

      gap:1rem;

      padding:1rem;

      justify-items:center;

      align-items:center;

      border-radius:10px;
    }

    section div{

      text-align:center;

      transition:0.3s;
    }

    section div:hover{

      transform:translateY(-5px);
    }

    section img{

      height:4.5rem;

      width:4rem;

      object-fit:contain;
    }

    h5{

      margin-top:0.5rem;

      font-size:0.9rem;
    }

    /* MAIN BANNER */

    main{
      margin:1rem;
    }

    main img{

      width:100%;

      height:auto;

      border-radius:10px;
    }

    /* PRODUCTS */

    .phto{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(180px,1fr));

      gap:1rem;

      background-color:white;

      margin:1rem;

      padding:1rem;

      border-radius:10px;
    }

    .phto div{

      background-color:white;

      padding:1rem;

      border-radius:10px;

      text-align:center;

      transition:0.3s;
    }

    .phto div:hover{

      transform:translateY(-5px);

      box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    }

    .phto img{

      width:100%;

      height:10rem;

      object-fit:contain;
    }

    h4{

      color:green;

      margin-top:0.4rem;
    }

    /* FOOTER */

    footer,
    address{

      margin:1rem;
    }

    footer img,
    address img{

      width:100%;

      height:auto;

      border-radius:10px;
    }

    /* TABLET */

    @media(max-width:992px)
    {

      .icon{
        max-width:100%;
      }

    }

    /* MOBILE */

    @media(max-width:768px)
    {

      .left,
      .lt{

        display:none;
      }

      .menu-icon{

        display:flex;

        justify-content:center;

        align-items:center;
      }

      header{

        flex-direction:row;

        justify-content:space-between;

        align-items:center;
      }

      .icon{

        order:3;

        width:100%;
      }

      section{

        grid-template-columns:
        repeat(3,1fr);
      }

      .phto{

        grid-template-columns:
        repeat(2,1fr);
      }

    }

    /* SMALL MOBILE */

    @media(max-width:480px)
    {

      section{

        grid-template-columns:
        repeat(2,1fr);
      }

      .phto{

        grid-template-columns:1fr;
      }

      header img{

        height:2.5rem;
      }

      .mc{

        font-size:1.6rem;
      }

      input[type="text"]{

        font-size:0.9rem;
      }

    }

  </style>

</head>

<body>

  <!-- HEADER -->

  <header>

    <img src="./flip.png" alt="">

    <!-- MENU ICON -->

    <div class="menu-icon">

      <i class="fa-solid fa-bars"></i>

    </div>

    <!-- SEARCH -->

    <div class="icon">

      <span class="material-symbols-outlined oc">
        search
      </span>

      <input
        type="text"
        placeholder="Search for Products, Brands And More"
      >

    </div>

    <!-- LOGIN -->

    <div class="left">

      <span class="material-symbols-outlined mc">
        account_circle
      </span>

      <a href="">Login</a>

    </div>

    <!-- CART -->

    <div class="left">

      <span class="material-symbols-outlined mc">
        shopping_cart
      </span>

      <a href="">Cart</a>

    </div>

    <!-- SELLER -->

    <div class="lt">

      <span class="material-symbols-outlined mc">
        storefront
      </span>

      <a href="">Become a Seller</a>

    </div>

    <!-- MORE -->

    <div class="lt">

      <span class="material-symbols-outlined mc">
        more_vert
      </span>

    </div>

  </header>

  <!-- CATEGORY -->

  <section>

    <div>
      <img src="./img/scooter.png" alt="">
      <h5>Minutes</h5>
    </div>

    <div>
      <img src="./img/phn.png" alt="">
      <h5>Mobiles</h5>
    </div>

    <div>
      <img src="./img/humans.png" alt="">
      <h5>Fashion</h5>
    </div>

    <div>
      <img src="./img/laptop.png" alt="">
      <h5>Electronics</h5>
    </div>

    <div>
      <img src="./img/tv.png" alt="">
      <h5>TVs</h5>
    </div>

    <div>
      <img src="./img/sofa.png" alt="">
      <h5>Furniture</h5>
    </div>

    <div>
      <img src="./img/Aero.png" alt="">
      <h5>Flights</h5>
    </div>

    <div>
      <img src="./img/teddy.png" alt="">
      <h5>Beauty</h5>
    </div>

  </section>

  <!-- MAIN -->

  <main>

    <img src="./img/main.png" alt="">

  </main>

  <!-- PRODUCTS -->

  <article class="phto">

    <div>

      <img src="./img/project.png" alt="">

      <h5>Projector</h5>

      <h4>From ₹6990</h4>

    </div>

    <div>

      <img src="./img/speaker.png" alt="">

      <h5>Speaker</h5>

      <h4>From ₹499</h4>

    </div>

    <div>

      <img src="./img/Monitor.png" alt="">

      <h5>Monitor</h5>

      <h4>From ₹6599</h4>

    </div>

    <div>

      <img src="./img/Monitors.png" alt="">

      <h5>Monitors</h5>

      <h4>From ₹8279</h4>

    </div>

    <div>

      <img src="./img/samrt.png" alt="">

      <h5>Smart Watches</h5>

      <h4>From ₹1399</h4>

    </div>

    <div>

      <img src="./img/earbuds.png" alt="">

      <h5>Earbuds</h5>

      <h4>From ₹999</h4>

    </div>

  </article>

  <!-- FOOTER -->

  <footer>

    <img src="./img/bootom.png" alt="">

  </footer>

  <!-- LAST -->

  <address>

    <img src="./img/last.png" alt="">

  </address>

</body>

</html>
